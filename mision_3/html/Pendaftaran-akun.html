<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pendaftaran Akun</title>
  </head>
  <body>
    <header class="header">
      <nav class="navigation">
        <div class="logo">
          <img src="../img/Logo.png" alt="" />
        </div>
      </nav>
    </header>

    <main class="register-page">
      <section class="register-card">
        <article>
          <h3 class="register-tittle">Masuk ke akun</h3>
          <p class="register-subtitle">
            Yuk, lanjutin belajarmu di videobelajar
          </p>
        </article>

        <form action="#1" method="get" class="register-form">
          <div class="register-name">
            <label class="label-name" for="nama">Nama Lengkap </label>
            <input
              type="text"
              id="nama"
              autocomplete="off"
              autocorrect="off"
              required
            />
          </div>

          <div class="register-email">
            <label for="email" class="label-email">E-mail</label>
            <input
              type="email"
              id="email"
              autocomplete="off"
              autocorrect="off"
              required
            />
          </div>

          <div class="register-hp">
            <label for="No.Hp" class="no-hp">No Hp</label>

            <div class="register-contry">
              <select name="No-Hp" id="No.Hp">
                <option value="+62">
                  <p>🇮🇩</p>
                  +62
                </option>
                <option value="+60">
                  <p>🇲🇾</p>
                  +60
                </option>
                <option value="+65">
                  <p>🇸🇬</p>
                  +65
                </option>
                <option value="+66">
                  <p>🇹🇭</p>
                  +66
                </option>
              </select>
            </div>

            <div class="register-nomber">
              <input
                type="tel"
                id="No.Hp"
                inputmode="numeric"
                pattern="[0-9]+"
                autocomplete="off"
                autocorrect="off"
                required
              />
            </div>
          </div>

          <div class="register-password">
            <label class="label-password" for="password">Kata Sandi</label>

            <div class="register-password">
              <input
                type="password"
                id="password"
                name="password"
                required
                autocorrect="off"
                autocomplete="off"
              />
            </div>

            <button type="button" href="#9">
              <img src="../img/mdi_eye-off.png" alt="" />
            </button>
          </div>

          <div class="register-kopassword">
            <label class="label-kopassword" for="password"
              >Konfirmasi Kata Sandi</label
            >

            <div class="register-kopassword">
              <input
                type="password"
                id="password"
                name="password"
                required
                autocorrect="off"
                autocomplete="off"
              />
            </div>

            <button type="button" href="#9">
              <img src="../img/mdi_eye-off.png" alt="" />
            </button>
          </div>

          <div class="form-lupa">
            <a class="lupa" href="#1">Lupa Pasword?</a>
          </div>
          <div class="form-button">
            <button class="masuk" type="submit">Masuk</button>
            <a class="daftar" href="../html/Pendaftaran-akun.html">Daftar</a>
            <p class="atau">atau</p>
            <button class="google" type="button" href="#5">
              <img src="../img/logos_google-icon.png" alt="logo_google" />
              <p>Masuk dengan Google</p>
            </button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>

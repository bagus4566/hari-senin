<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login</title>
    <link rel="stylesheet" href="../css/login_mission_3.css" />
  </head>
  <body>
    <header class="header">
      <nav class="navigation">
        <div class="logo">
          <img src="../img/Logo.png" alt="" />
        </div>
      </nav>
      <main class="login-page">
        <section class="login-card">
          <article>
            <h3 class="login-tittle">Masuk ke akun</h3>
            <p class="login-subtitle">
              Yuk, lanjutin belajarmu di videobelajar
            </p>
          </article>
          <form class="login-form">
           <div class="input-box">
            <div class="login-email">
              <label class="label-email" for="email">E-mail</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="masukan E-mail"
                required
                autocorrect="off"
              />
            </div>
            <div class="login-password">
              <label class="label-password" for="password">Kata Sandi</label>
              <div class="grup-password">
               <input
                type="password"
                id="password"
                name="password"
                placeholder="masukan kata sandi"
                required
                autocorrect="off"
                />
                <button type="button" href="#9"><img src="../img/mdi_eye-off.png" alt="" /></button>
             </div>
            </div>
            
           </div>
            <div class="form-lupa">
            <a class="lupa" href="#1">Lupa Pasword?</a>
            </div>
            <div class="form-button">
            <button class="masuk" type="submit">Masuk</button>
            <a class="daftar" href="#2">Daftar</a>
            <p>atau</p>
            <button class="google" type="button">
              <img src="../img/logos_google-icon.png" alt="logo_google" />
              Masuk dengan Google
            </button>
           </form>
          </div>
        </section>
      </main>
    </header>
  </body>
</html>
